var FALLBACK_QS=[{"id":"3451ba2f-d4e1-4ebf-8bb5-d1f42953cfad","text":"Pourquoi le cadran “Paul Newman” de la Rolex Daytona porte-t-il ce surnom ?","diff":3,"cat":"culture","expl":"Rolex appelait ce cadran “Exotic”. Peu populaire à l’époque, il a été redécouvert par des passionnés italiens qui l’ont baptisé “Paul Newman” — ironie : seulement 2000 à 3000 exemplaires furent produits.","answers":[{"t":"Des collectionneurs italiens ont associé ce cadran exotique à Newman après avoir vu des photos de lui le portant dans les années 80","ok":true,"te":"Italian collectors linked this exotic dial to Newman after seeing photos of him wearing it in the 1980s"},{"t":"Rolex a nommé officiellement ce cadran “Paul Newman” après sa victoire aux 24h de Daytona 1979","ok":false,"te":"Rolex officially named the dial “Paul Newman” after his 1979 24 Hours of Daytona victory"},{"t":"Newman a dessiné lui-même le cadran en collaboration avec Rolex pour le film Winning (1969)","ok":false,"te":"Newman designed the dial himself with Rolex for the film Winning (1969)"},{"t":"Le surnom vient d’une publicité Rolex des années 70 avec Newman comme ambassadeur","ok":false,"te":"The nickname comes from a 1970s Rolex ad featuring Newman as brand ambassador"}],"text_en":"Why does the Rolex Daytona’s “Paul Newman” dial bear that nickname?","expl_en":"Rolex called it the “Exotic” dial. Unpopular at the time, it was rediscovered by Italian enthusiasts who dubbed it “Paul Newman” — irony: only 2,000 to 3,000 were ever made."},{"id":"a0c70cfd-f08d-46c0-9b6c-7558a2c4c588","text":"Pourquoi Steve McQueen a-t-il choisi la Heuer Monaco pour le film Le Mans (1971) plutôt que l'Autavia portée par Jo Siffert ?","diff":3,"cat":"culture","expl":"McQueen s'inspira de Siffert pour son personnage, combinaison, logo Heuer, mais choisit la Monaco carrée parmi les chronographes livrés par Jack Heuer sur le plateau.","answers":[{"t":"Pour son design carré avant-gardiste qui le distinguait à l'écran","ok":true,"te":"For its avant-garde square design that stood out on screen"},{"t":"Parce que Heuer avait payé un contrat de placement produit exclusif pour la Monaco","ok":false,"te":"Because Heuer had paid an exclusive product placement contract for the Monaco"},{"t":"Parce que l'Autavia n'était pas étanche et inadaptée aux scènes sous la pluie","ok":false,"te":"Because the Autavia wasn't waterproof and unsuitable for rain scenes"},{"t":"Parce que Siffert refusa de prêter son Autavia personnelle","ok":false,"te":"Because Siffert refused to lend his personal Autavia"}],"text_en":"Why did Steve McQueen choose the Heuer Monaco for Le Mans (1971) over Jo Siffert's Autavia?","expl_en":"McQueen modeled his character on Siffert, racing suit, Heuer logo, but chose the square Monaco from the chronographs Jack Heuer delivered to set."},{"id":"238acd49-07c2-496c-a395-cf3a611fefba","text":"Qui a initié le concept du Calibre 11 en 1965 ?","diff":4,"cat":"histoire","expl":"Dubois, petit-fils du fondateur de Dépraz, avait compris que le micro-rotor Büren serait assez fin pour y greffer un module chrono — mais Dépraz ne pouvait pas financer seul le développement.","answers":[{"t":"Gérald Dubois (Dépraz), qui chercha des partenaires financiers et techniques","ok":true,"te":"Gérald Dubois (Dépraz), who sought financial and technical partners"},{"t":"Jack Heuer, qui contacta Büren","ok":false,"te":"Jack Heuer, who contacted Büren"},{"t":"Willy Breitling, qui contacta Heuer et Büren","ok":false,"te":"Willy Breitling, who contacted Heuer and Büren"},{"t":"Hans Kocher (Büren), qui contacta Dépraz","ok":false,"te":"Hans Kocher (Büren), who contacted Dépraz"}],"text_en":"Who initiated the concept of the Calibre 11 in 1965?","expl_en":"Dubois, grandson of Dépraz's founder, realized the Büren micro-rotor was thin enough for a chrono module — but Dépraz couldn't finance development alone."},{"id":"5d0bd875-6a3c-4c0d-ae80-4976976bc240","text":"Comment la Seiko 6139 \"Pogue\" s'est-elle retrouvée dans l'espace en 1973 ?","diff":4,"cat":"culture","expl":"Pogue avait acheté sa Seiko pour 71$ dans un magasin de base militaire. Habitué à l'utiliser en entraînement, il l'a emportée à bord de Skylab 4, la portant au poignet gauche, Speedmaster au droit.","answers":[{"t":"Le Colonel Pogue l'a glissée dans ses affaires personnelles, sans approbation NASA","ok":true,"te":"Col. Pogue slipped it into his personal belongings, without NASA approval"},{"t":"Seiko avait un contrat d'essai avec NASA pour tester des alternatives à la Speedmaster","ok":false,"te":"Seiko had a trial contract with NASA to test Speedmaster alternatives"},{"t":"Un ingénieur japonais du programme Skylab l'a offerte à l'équipage","ok":false,"te":"A Japanese Skylab engineer gifted it to the crew"},{"t":"NASA l'avait sélectionnée comme chrono de secours après tests de qualification","ok":false,"te":"NASA l'avait sélectionnée comme chrono de secours après tests de qualification"}],"text_en":"How did the Seiko 6139 \"Pogue\" end up in space in 1973?","expl_en":"🇬🇧 Pogue bought his Seiko for $71 at a military base store. Used to wearing it in training, he took it aboard Skylab 4, wearing it on his left wrist, Speedmaster on the right."},{"id":"159b91cd-cdfe-44c4-95c6-688273027fcf","text":"Consortium \"Projet 99\" (1966) : quel était le rôle de chaque membre dans le développement du premier chronographe automatique ?","diff":5,"cat":"culture","expl":"Le micro-rotor Büren (cal. 1280) servait de base, module chrono Dubois-Dépraz monté côté fond — d'où le mouvement retourné et la couronne à gauche, signatures du Calibre 11.","answers":[{"t":"Büren : mouvement micro-rotor / Dubois-Dépraz : module chrono / Heuer & Breitling : financement et commercialisation","ok":true,"te":"Büren: micro-rotor movement / Dubois-Dépraz: chrono module / Heuer & Breitling: financing and marketing"},{"t":"Heuer : mouvement / Breitling : boîtiers / Büren : assemblage / Dubois-Dépraz : échappement","ok":false,"te":"Heuer: movement / Breitling: cases / Büren: assembly / Dubois-Dépraz: escapement"},{"t":"Dubois-Dépraz : calibre de base / Büren : module chrono / Heuer & Breitling : marketing","ok":false,"te":"Dubois-Dépraz: base caliber / Büren: chrono module / Heuer & Breitling: marketing"},{"t":"Breitling : direction technique / Heuer : financement / Büren & Dubois-Dépraz : mouvement intégré","ok":false,"te":"Breitling: technical lead / Heuer: financing / Büren & Dubois-Dépraz: integrated movement"}],"text_en":"\"Project 99\" consortium (1966): what was each member's role in developing the first automatic chronograph?","expl_en":"The Büren micro-rotor (cal. 1280) was the base, Dubois-Dépraz chrono module mounted on the caseback side — hence the flipped movement and left-side crown, Calibre 11's signatures."},{"id":"57b13b9a-5911-46c5-a563-8ec4c5b16360","text":"Pourquoi le Zenith El Primero bat-il à 36 000 alternances/heure (5 Hz) au lieu des 28 800 alt/h habituelles ?","diff":3,"cat":"culture","expl":"À 36 000 alt/h, l'aiguille du chronographe avance par bonds de 1/10e de seconde au lieu de 1/8e, offrant une précision de mesure inégalée à l'époque de son lancement en 1969.","answers":[{"t":"Pour mesurer le temps écoulé au 1/10e de seconde sur le chronographe","ok":true,"te":"o measure elapsed time to 1/10th of a second on the chronograph"},{"t":"Pour compenser l'absence de système antichoc dans le calibre original","ok":false,"te":"To compensate for the lack of shock protection in the original caliber"},{"t":"Pour permettre au mouvement de fonctionner sans lubrification pendant 5 ans","ok":false,"te":"To allow the movement to run without lubrication for 5 years"},{"t":"Pour synchroniser la fréquence avec les signaux horaires radio suisses","ok":false,"te":"To synchronize the frequency with Swiss radio time signals"}],"text_en":"Why does the Zenith El Primero beat at 36,000 vibrations per hour (5 Hz) instead of the usual 28,800 vph?","expl_en":"At 36,000 vph, the chronograph hand advances in 1/10th-second increments instead of 1/8th, offering unmatched timing precision when it launched in 1969."},{"id":"30e80330-85ec-4f59-ab64-06c3994934a8","text":"En 1975, l'horloger Charles Vermot a sauvé le calibre El Primero de la destruction ordonnée par les propriétaires américains de Zenith. Où a-t-il caché l'outillage ?","diff":4,"cat":"culture","expl":"Vermot a caché plus d'une tonne de presses, plans techniques et outils dans un grenier muré de la manufacture. Son trésor a dormi près de 10 ans avant qu'Ebel puis Rolex ne relancent la demande pour l'El Primero en 1984.","answers":[{"t":"Dans un grenier muré de la manufacture, à Le Locle","ok":true,"te":"In a walled-off attic of the manufacture, in Le Locle"},{"t":"Dans la cave de sa maison personnelle à Ponts-de-Martel","ok":false,"te":"In the basement of his personal home in Ponts-de-Martel"},{"t":"Dans un entrepôt loué secrètement à La Chaux-de-Fonds","ok":false,"te":"In a secretly rented warehouse in La Chaux-de-Fonds"},{"t":"Dans les locaux désaffectés de Martel Watch Co., l'ancien fabricant d'ébauches","ok":false,"te":"In the disused premises of Martel Watch Co., the former ébauche manufacturer"}],"text_en":"In 1975, watchmaker Charles Vermot saved the El Primero caliber from destruction ordered by Zenith's American owners. Where did he hide the tooling?","expl_en":"Vermot hid over a ton of presses, technical plans and tools in a walled-off attic of the manufacture. His treasure lay dormant for nearly 10 years until Ebel and then Rolex revived demand for the El Primero in 1984."},{"id":"10b1fa5a-c2a8-44c6-b337-6e4f9977f742","text":"Sinn a longtemps revendiqué que sa 140 était le premier chronographe automatique dans l'espace (mission Spacelab D1, 1985). Quelle montre détenait en réalité ce titre depuis 1974 ?","diff":4,"cat":"culture","expl":"En 2007, on découvrit que le Colonel Pogue avait emporté sa Seiko 6139 personnelle sur Skylab 4 en 1973-74 — onze ans avant Furrer et sa Sinn. Pogue ne portait pas la montre approuvée par la NASA et avait simplement glissé sa Seiko dans ses affaires personnelles.","answers":[{"t":"Seiko 6139, portée par le Colonel William Pogue lors de Skylab 4","ok":true,"te":"Seiko 6139, worn by Colonel William Pogue during Skylab 4"},{"t":"Omega Speedmaster automatique ref. 176.0012, portée lors de la mission Soyouz-Apollo en 1975","ok":false,"te":"Omega Speedmaster automatic ref. 176.0012, worn during the Apollo-Soyuz mission in 1975"},{"t":"Breitling Navitimer Cosmonaute, portée par Scott Carpenter sur Mercury 7","ok":false,"te":"Breitling Navitimer Cosmonaut, worn by Scott Carpenter on Mercury 7"},{"t":"Bulova Chronograph, portée par Dave Scott sur Apollo 15","ok":false,"te":"Bulova Chronograph, worn by Dave Scott on Apollo 15"}],"text_en":"Sinn long claimed that its 140 was the first automatic chronograph in space (Spacelab D1 mission, 1985). Which watch actually held that title since 1974?","expl_en":"In 2007, it was discovered that Colonel Pogue had taken his personal Seiko 6139 aboard Skylab 4 in 1973-74, eleven years before Furrer and his Sinn. Pogue wasn't wearing the NASA-approved watch and had simply packed his Seiko among his personal belongings."},{"id":"4cb70dd6-b263-45ef-a1f2-10816d3064a0","text":"D'où vient le nom \"Fifty Fathoms\" de la Blancpain ?","diff":3,"cat":"culture","expl":"Une brasse (fathom) vaut 1,8288m. 50 brasses = 91,44m, soit la limite de profondeur pour un plongeur en air comprimé standard à 200 bars dans les années 50. La montre elle-même était testée à 150m.","answers":[{"t":"50 brasses (91,44m) — la profondeur maximale qu'un plongeur autonome pouvait atteindre à l'air comprimé dans les années 50","ok":true,"te":"50 fathoms (91.44m) — the maximum depth an autonomous diver could reach on compressed air in the 1950s"},{"t":"Une référence à Shakespeare, \"La Tempête\" : \"Full fathom five thy father lies\"","ok":false,"te":"A reference to Shakespeare's \"The Tempest\": \"Full fathom five thy father lies\""},{"t":"La profondeur maximale atteinte lors des premiers tests de la montre par la Marine française","ok":false,"te":"The maximum depth reached during the French Navy's first tests of the watch"},{"t":"Un choix marketing de Fiechter pour évoquer la profondeur sans référence technique précise","ok":false,"te":"A marketing choice by Fiechter to evoke depth with no precise technical reference"}],"text_en":"Where does the name \"Fifty Fathoms\" come from?","expl_en":"A fathom equals 1.8288m. 50 fathoms = 91.44m, the depth limit for a diver on standard 200-bar compressed air in the 1950s. The watch itself was tested to 150m."},{"id":"c83250b9-28e7-495f-a336-c65b94ecbda5","text":"Pourquoi la Blancpain Fifty Fathoms a-t-elle été vendue en France sous le nom \"Aqua Lung\" et avec un double marquage Lip sur le cadran ?","diff":4,"cat":"histoire","expl":"Ironie de l'histoire : Maloubier et Riffaud, les officiers de la Marine qui ont conçu le cahier des charges de la Fifty Fathoms, avaient d'abord contacté Lip qui avait refusé le projet. Lip s'est retrouvée à distribuer la montre qu'elle avait elle-même rejetée.","answers":[{"t":"Le gouvernement français exigeait que l'équipement militaire soit acheté via des entreprises françaises — Blancpain a dû passer par Spirotechnique (liée à Cousteau) puis Lip pour la distribution","ok":true,"te":"The French government required military equipment to be purchased from French companies — Blancpain had to go through Spirotechnique (linked to Cousteau) then Lip for distribution"},{"t":"Lip avait co-développé le mouvement de la Fifty Fathoms et exigeait la mention de son nom","ok":false,"te":"Lip had co-developed the Fifty Fathoms movement and demanded its name be included"},{"t":"Blancpain n'avait pas les moyens de distribuer seule et a vendu la licence à Lip","ok":false,"te":"Blancpain couldn't afford solo distribution and sold the license to Lip"},{"t":"Cousteau avait un contrat d'exclusivité avec Lip pour toutes les montres de plongée en France","ok":false,"te":"Cousteau had an exclusivity contract with Lip for all dive watches in France"}],"text_en":"Why was the Blancpain Fifty Fathoms sold in France under the \"Aqua Lung\" name with dual Lip branding on the dial?","expl_en":"Ironically, Maloubier and Riffaud, the Navy officers who wrote the Fifty Fathoms specifications, had first approached Lip who turned the project down. Lip ended up distributing the very watch it had rejected."},{"id":"50a3892f-aee5-4f69-b8d8-edebb8556870","text":"Selon une anecdote célèbre, à quoi un cosmonaute a-t-il utilisé sa Fortis Cosmonauts Chronograph lors d'une sortie extravéhiculaire sur l'ISS ?","diff":5,"cat":"culture","expl":"Lors d'une EVA, un cosmonaute se retrouve sans marteau. Il détache sa Fortis de sa combinaison et l'utilise pour enfoncer un rivet. La montre a survécu sans dommage — une démonstration involontaire mais spectaculaire de sa robustesse.","answers":[{"t":"Comme marteau de fortune pour enfoncer un rivet","ok":true,"te":"As an improvised hammer to drive a rivet"},{"t":"Comme miroir pour inspecter une zone inaccessible","ok":false,"te":"As a mirror to inspect an inaccessible area"},{"t":"Comme contrepoids pour stabiliser un outil flottant","ok":false,"te":"As a counterweight to stabilize a floating tool"},{"t":"Comme repère visuel pour guider un bras robotique","ok":false,"te":"As a visual marker to guide a robotic arm"}],"text_en":"According to a famous anecdote, what did a cosmonaut use his Fortis Cosmonauts Chronograph for during an EVA on the ISS?","expl_en":"During an EVA, a cosmonaut found himself without a hammer. He unstrapped his Fortis from his suit and used it to drive a rivet. The watch survived undamaged — an unintentional but spectacular demonstration of its toughness."},{"id":"dba32732-5bbc-46e6-805a-d3b4ae6b2e7e","text":"Quelle montre est officiellement fournie aux cosmonautes du programme spatial russe depuis 1994, après avoir passé les tests du Centre d'entraînement Gagarin ?","diff":3,"cat":"culture","expl":"En 1994, après des tests extrêmes au Centre d'entraînement Gagarin (accélérations de 12g, quasi-vide), la Fortis Cosmonauts Chronograph devint la montre officielle du programme spatial russe. Chaque cosmonaute diplômé du programme Soyouz en reçoit une.","answers":[{"t":"Fortis Official Cosmonauts Chronograph","ok":true,"te":"Fortis Official Cosmonauts Chronograph"},{"t":"Sturmanskie (Штурманские)","ok":false,"te":"Sturmanskie (Штурманские)"},{"t":"Vostok Amphibia","ok":false,"te":"Vostok Amphibia"},{"t":"Poljot Strela","ok":false,"te":"Poljot Strela"}],"text_en":"Which watch has been officially issued to cosmonauts of the Russian space program since 1994, after passing tests at the Gagarin Training Center?","expl_en":"In 1994, after extreme testing at the Gagarin Training Center (12g acceleration, near-vacuum conditions), the Fortis Cosmonauts Chronograph became the official watch of the Russian space program. Every cosmonaut graduating from the Soyuz program receives one."},{"id":"0a4fc690-6d04-48f9-a679-87742bff872b","text":"Quel designer de mode a poussé Lip à décliner la Nautic-Ski dans une gamme de couleurs et de cadrans variés, en faisant un succès auprès des jeunes consommateurs ?","diff":4,"cat":"culture","expl":"Pierre Cardin, visionnaire du prêt-à-porter futuriste, a encouragé Lip à proposer la Nautic-Ski en multiples coloris. Cette approche \"mode\" était révolutionnaire pour une montre de plongée dans les années 60.","answers":[{"t":"Pierre Cardin","ok":true,"te":"Pierre Cardin"},{"t":"André Courrèges","ok":false,"te":"André Courrèges"},{"t":"Yves Saint Laurent","ok":false,"te":"Yves Saint Laurent"},{"t":"Paco Rabanne","ok":false,"te":"Paco Rabanne"}],"text_en":"Which fashion designer pushed Lip to release the Nautic-Ski in a range of colorways and varied dials, making it a hit with younger consumers?","expl_en":"Pierre Cardin, visionary of futuristic ready-to-wear, encouraged Lip to offer the Nautic-Ski in multiple colorways. This \"fashion\" approach was revolutionary for a dive watch in the 1960s."},{"id":"ab8634f4-8c25-4a10-ac94-f5066c261248","text":"D'où vient le nom \"Nautic-Ski\" de la célèbre plongeuse Lip de 1967 ?","diff":3,"cat":"histoire","expl":"Fred Lip voulait une montre taillée pour les sports extrêmes. \"Nautic\" célèbre ses 200m d'étanchéité et \"Ski\" rend hommage à sa fille Muriel, membre de l'équipe de France féminine de ski alpin dans les années 50.","answers":[{"t":"Fred Lip voulait une montre taillée pour les sports extrêmes. \"Nautic\" renvoie à son étanchéité de 200m et \"Ski\" rend hommage à sa fille Muriel, membre de l'équipe de France féminine de ski alpin dans les années 50.","ok":true,"te":"Fred Lip wanted a watch built for extreme sports. \"Nautic\" refers to its 200m water-resistance and \"Ski\" pays tribute to his daughter Muriel, a member of the French women's alpine ski team in the 1950s."},{"t":"Une contraction de \"nautique\" et \"ski nautique\", les deux sports visés par la montre","ok":false,"te":"A contraction of \"nautical\" and \"water skiing\", the two sports targeted by the watch"},{"t":"Un clin d'œil aux JO d'hiver de Grenoble 1968 où Lip était chronométreur officiel","ok":false,"te":"A nod to the 1968 Grenoble Winter Olympics where Lip was official timekeeper"},{"t":"Un acronyme interne de la manufacture : \"Sport, Kinétique, Innovation\"","ok":false,"te":"An internal manufacture acronym: \"Sport, Kinetic, Innovation\""}],"text_en":"Where does the name \"Nautic-Ski\" of the famous 1967 Lip diver come from?","expl_en":"Fred Lip wanted a watch built for extreme sports. \"Nautic\" celebrates its 200m water-resistance and \"Ski\" pays tribute to his daughter Muriel, a member of the French women's alpine ski team in the 1950s."},{"id":"e403e716-9786-4910-b055-c287c1f830e6","text":"Pourquoi le cadran de la Doxa SUB 300 (1967) est-il orange ?","diff":3,"cat":"culture","expl":"L'orange a été choisi pour sa lisibilité maximale en eaux profondes et troubles, où les couleurs traditionnelles (noir, blanc) disparaissent rapidement. Jacques Cousteau fut tellement convaincu qu'il équipa toute son équipe du Calypso de SUB 300.","answers":[{"t":"L'orange est l'une des dernières couleurs visibles en profondeur sous l'eau","ok":true,"te":"Orange is one of the last colors visible at depth underwater"},{"t":"Pour correspondre aux gilets de sauvetage et bouées de signalisation, facilitant le repérage du plongeur en surface","ok":false,"te":"To match life vests and signal buoys, making the diver easier to spot on the surface"},{"t":"Pour créer un contraste maximal avec le bleu de l'eau, sur recommandation de la Marine américaine","ok":false,"te":"To create maximum contrast with blue water, on US Navy recommendation"},{"t":"Pour réduire la fatigue visuelle lors de longues plongées, le orange étant plus reposant que le blanc en basse luminosité","ok":false,"te":"To reduce eye strain during long dives, orange being less tiring than white in low light"}],"text_en":"Why is the dial of the Doxa SUB 300 (1967) orange?","expl_en":"Orange was chosen for maximum legibility in deep and murky waters, where traditional colors (black, white) quickly disappear. Jacques Cousteau was so convinced that he equipped his entire Calypso crew with SUB 300s."},{"id":"adadb9e4-b104-4366-97d8-2e5eef3111b4","text":"Quelle innovation la Doxa SUB 300T Conquistador de 1969 a-t-elle introduite en première mondiale sur une montre commerciale ?","diff":4,"cat":"histoire","expl":"La Conquistador fut la première montre commerciale équipée d'une valve à hélium, co-développée avec Rolex. Cette technologie permet aux molécules d'hélium accumulées lors de plongées en saturation de s'échapper sans faire exploser le verre. Rolex l'intégrera à sa Sea-Dweller en 1971.","answers":[{"t":"La valve à hélium (HEV) pour la plongée à saturation","ok":true,"te":"La valve à hélium (HEV) pour la plongée à saturation"},{"t":"La lunette unidirectionnelle avec table de décompression","ok":false,"te":"The unidirectional bezel with decompression table"},{"t":"Le cadran orange pour la lisibilité sous-marine","ok":false,"te":"The orange dial for underwater legibility"},{"t":"Le boîtier monobloc en acier","ok":false,"te":"The monoblock steel case"}],"text_en":"What world-first innovation did the 1969 Doxa SUB 300T Conquistador introduce on a commercial watch?","expl_en":"La Conquistador fut la première montre commerciale équipée d'une valve à hélium, co-développée avec Rolex. Cette technologie permet aux molécules d'hélium accumulées lors de plongées en saturation de s'échapper sans faire exploser le verre. Rolex l'intégrera à sa Sea-Dweller en 1971."},{"id":"da9a2462-3fdb-4f63-95ed-cde4934b1393","text":"Comment la Vulcain Cricket originale (calibre 120) résout-elle le problème de l'armage avec une seule couronne pour deux barillets distincts (mouvement + alarme) ?","diff":4,"cat":"technique","expl":"Le calibre 120 utilise un ingénieux basculeur : une seule couronne sert aux deux barillets selon le sens de rotation. C'est l'inverse de la convention habituelle — tourner vers l'avant arme l'alarme, pas le mouvement.","answers":[{"t":"Un basculeur interne : tourner la couronne vers l'avant arme l'alarme, vers l'arrière arme le mouvement","ok":true,"te":"An internal rocker: turning the crown forward winds the alarm, backward winds the movement"},{"t":"Un poussoir séparé à 2h sélectionne le barillet à armer","ok":false,"te":"A separate pusher at 2 o'clock selects which barrel to wind"},{"t":"A separate pusher at 2 o'clock selects which barrel to wind","ok":false,"te":"Both barrels are wound simultaneously by the same crown"},{"t":"Tirer la couronne à mi-course arme l'alarme, la pousser à fond arme le mouvement","ok":false,"te":"Pulling the crown halfway winds the alarm, pushing fully winds the movement"}],"text_en":"How does the original Vulcain Cricket (caliber 120) solve the winding problem with a single crown for two separate barrels (movement + alarm)?","expl_en":"The caliber 120 uses an ingenious rocker mechanism: a single crown serves both barrels depending on the direction of rotation. It's the reverse of the usual convention — winding forward powers the alarm, not the movement."},{"id":"ac2fbcca-31b4-42e5-b09d-d327e2e7e9c5","text":"Quel président américain a commandé 200 Vulcain Cricket pour les offrir en cadeaux pendant son mandat ?","diff":4,"cat":"histoire","expl":"LBJ était fan au point d'acheter lui-même sa Cricket à Genève et d'en commander 200 comme cadeaux officiels. Il activait régulièrement l'alarme pour s'échapper de réunions, le bourdonnement a été confondu avec une bombe par le Secret Service à plusieurs reprises.","answers":[{"t":"Lyndon B. Johnson","ok":true,"te":"Lyndon B. Johnson"},{"t":"Dwight D. Eisenhower","ok":false,"te":"Dwight D. Eisenhower"},{"t":"Harry S. Truman","ok":false,"te":"Harry S. Truman"},{"t":"Richard Nixon","ok":false,"te":"Richard Nixon"}],"text_en":"Which US president ordered 200 Vulcain Crickets to give as gifts during his term?","expl_en":"LBJ was such a fan that he personally bought his Cricket in Geneva and ordered 200 as official gifts. He regularly set the alarm to escape meetings, the buzzing was mistaken for a bomb by the Secret Service on multiple occasions."},{"id":"75bebb35-0070-472b-958e-bb8164a17c00","text":"Quelle particularité unique distingue le mécanisme de stop-seconde (hacking) de la Glycine Airman originale ?","diff":4,"cat":"culture","expl":"En tirant la couronne à 4h, un levier pousse un fin fil métallique à travers un trou minuscule entre le 2 et le 4 du \"24\" sur le cadran. L'aiguille continue de tourner puis se bloque contre ce fil en arrivant à 24h. Un système brillant dans sa simplicité.","answers":[{"t":"L'aiguille des secondes continue jusqu'à atteindre 12h/24h où un fil métallique l'arrête","ok":true,"te":"The seconds hand continues until reaching 12/24 where a metal wire stops it"},{"t":"L'aiguille s'arrête instantanément quelle que soit sa position","ok":false,"te":"The hand stops instantly at any position"},{"t":"L'aiguille recule jusqu'au repère le plus proche","ok":false,"te":"The hand moves back to the nearest marker"},{"t":"L'aiguille effectue un tour complet supplémentaire avant de s'arrêter","ok":false,"te":"The hand completes one more full revolution before stopping"}],"text_en":"What unique feature distinguishes the hacking seconds mechanism of the original Glycine Airman?","expl_en":"Pulling the crown at 4 o'clock pushes a thin metal wire through a tiny hole between the 2 and 4 of \"24\" on the dial. The seconds hand keeps sweeping until it catches on the wire at the 24 position. A system brilliant in its simplicity."},{"id":"629ac63f-e092-4c8b-9bb4-f3e93c694206","text":"Quelle est l'origine de la Glycine Airman, lancée en 1953 ?","diff":4,"cat":"histoire","expl":"En 1953, Samuel Glur, directeur commercial de Glycine, discute avec un pilote en cockpit sur un vol Bangkok-Calcutta. Le pilote décrit la montre idéale : cadran 24h, lunette rotative verrouillable pour un second fuseau. Quelques mois plus tard, l'Airman est née.","answers":[{"t":"Une conversation entre un directeur commercial de Glycine et un pilote de ligne en plein vol","ok":true,"te":"A conversation between a Glycine sales director and an airline pilot mid-flight"},{"t":"Une commande officielle de la NASA pour les missions Gemini","ok":false,"te":"An official NASA commission for Gemini missions"},{"t":"Un concours de design organisé par Breitling et remporté par Glycine","ok":false,"te":"A design competition organized by Breitling and won by Glycine"},{"t":"Un cahier des charges de l'US Air Force pour le Vietnam","ok":false,"te":"Un cahier des charges de l'US Air Force pour le Vietnam"}],"text_en":"What is the origin of the Glycine Airman, launched in 1953?","expl_en":"In 1953, Samuel Glur, Glycine's sales director, chatted with a pilot in the cockpit on a Bangkok-to-Calcutta flight. The pilot described his ideal watch: 24h dial, lockable rotating bezel for a second time zone. A few months later, the Airman was born."},{"id":"55b917fe-99ac-4c07-9985-75811b779bc1","text":"Quelle montre est exposée au Musée Kon-Tiki d'Oslo comme garde-temps de l'expédition de 1947 ?","diff":5,"cat":"culture","expl":"Malgré le récit marketing d'Eterna, la montre exposée est une Longines militaire britannique, probablement acquise en surplus après-guerre. Aucune Eterna portée lors de l'expédition n'a jamais été formellement identifiée.","answers":[{"t":"Une Longines militaire britannique de la Seconde Guerre mondiale","ok":true,"te":"A British military Longines from World War II"},{"t":"Une Eterna-Matic Kontiki","ok":false,"te":"A Eterna-Matic Kontiki"},{"t":"Un chronomètre de marine Hamilton","ok":false,"te":"A Hamilton marine chronometer"},{"t":"Une Omega Seamaster","ok":false,"te":"An Omega Seamaster"}],"text_en":"Which watch is displayed at the Kon-Tiki Museum in Oslo as the expedition's timekeeper from 1947?","expl_en":"Despite Eterna's marketing narrative, the watch on display is a British military Longines, likely acquired as post-war surplus. No Eterna worn during the expedition has ever been formally identified."},{"id":"03149f02-3a95-4270-a8bc-b177f1f65e06","text":"Quel est le rôle de l'ancre pivotante montée sur rubis qui figure sur le cadran de la Rado Captain Cook originale de 1962 ?","diff":4,"cat":"culture","expl":"L'ancre n'est pas qu'esthétique : montée sur un palier de rubis lubrifié derrière le cadran, sa rotation libre signale que le mouvement fonctionne normalement. Quand elle se fige, c'est le signe qu'un service est nécessaire.","answers":[{"t":"Indicateur d'entretien : quand elle cesse de tourner librement, le mouvement doit être révisé","ok":true,"te":"Service indicator: when it stops spinning freely, the movement needs servicing"},{"t":"Indicateur de réserve de marche","ok":false,"te":"Power reserve indicator"},{"t":"Élément purement décoratif sans fonction","ok":false,"te":"Purely decorative element with no function"},{"t":"Indicateur d'étanchéité du boîtier","ok":false,"te":"Case water-resistance indicator"}],"text_en":"What is the purpose of the ruby-mounted pivoting anchor on the dial of the original 1962 Rado Captain Cook?","expl_en":"The anchor isn't just decorative: mounted on a lubricated ruby bearing behind the dial, its free rotation signals normal movement operation. When it stops spinning, it's a sign that servicing is needed."},{"id":"7d4061b3-80b7-4131-807a-bb4d0e7b61af","text":"En 1954, quelle montre a été créée pour les pilotes de la Scandinavian Airlines (SAS) à l'occasion du premier vol commercial transpolaire entre Copenhague et Los Angeles ?","diff":4,"cat":"histoire","expl":"Dessinée par un Gérald Genta de 23 ans, la Polarouter devait résister aux champs magnétiques extrêmes du pôle Nord. Les premiers exemplaires furent offerts aux pilotes SAS à l'atterrissage à Los Angeles le 15 novembre 1954.","answers":[{"t":"Universal Genève Polerouter \"Polarouter\"","ok":true,"te":"Universal Genève Polerouter \"Polarouter\""},{"t":"Breitling Navitimer","ok":false,"te":"Breitling Navitimer"},{"t":"Longines Lindbergh Hour Angle","ok":false,"te":"Longines Lindbergh Hour Angle"},{"t":"Eterna KonTiki","ok":false,"te":"Eterna KonTiki"}],"text_en":"In 1954, which watch was created for Scandinavian Airlines (SAS) pilots for the first commercial transpolar flight between Copenhagen and Los Angeles?","expl_en":"Designed by a 23-year-old Gérald Genta, the Polarouter had to withstand the extreme magnetic fields of the North Pole. The first pieces were gifted to SAS pilots upon landing in Los Angeles on November 15, 1954."},{"id":"ddf83768-39f9-43e3-aa99-886ee11132b6","text":"En quelle année Patek Philippe a-t-il créé la première montre-bracelet à quantième perpétuel au monde ?","diff":5,"cat":"histoire","expl":"Le mouvement N°97975, initialement conçu en 1898 pour un pendentif invendu, fut reemboîté en 1925 dans un boîtier or jaune de 34,4 mm. Cette pièce unique, vendue en 1927 à Thomas Emery, est aujourd'hui conservée au Musée Patek Philippe.","answers":[{"t":"1925","ok":true,"te":"1925"},{"t":"1941","ok":false,"te":"1941"},{"t":"1933","ok":false,"te":"1933"},{"t":"1898","ok":false,"te":"1898"}],"text_en":"In which year did Patek Philippe create the world's first perpetual calendar wristwatch?","expl_en":"Movement No. 97975, originally designed in 1898 for an unsold pendant, was recased in 1925 in a 34.4 mm yellow gold case. This unique piece, sold in 1927 to Thomas Emery, is now housed in the Patek Philippe Museum."},{"id":"e9c65eec-4975-4313-ae9a-c4af313fd7b6","text":"Quel calibre équipait les Omega Speedmaster portées par les astronautes d'Apollo 11 en 1969 ?","diff":3,"cat":"histoire","expl":"Les Speedmaster de la mission Apollo 11 (réf. 105.012 et 145.012) embarquaient le calibre 321, un chronographe à roue à colonnes dérivé du Lemania 2310. Le calibre 861 lui a succédé mais n'équipait pas encore les montres de cette mission.","answers":[{"t":"Omega 321","ok":true,"te":"Omega 321"},{"t":"Omega 861","ok":false,"te":"Omega 861"},{"t":"Omega 1861","ok":false,"te":"Omega 1861"},{"t":"Valjoux 72","ok":false,"te":"Valjoux 72"}],"text_en":"Which calibre powered the Omega Speedmaster watches worn by the Apollo 11 astronauts in 1969?","expl_en":"The Apollo 11 Speedmasters (ref. 105.012 and 145.012) were powered by the calibre 321, a column-wheel chronograph derived from the Lemania 2310. The calibre 861 succeeded it but did not yet equip the watches of this mission."},{"id":"74b2f449-74e5-4da0-b183-8e56eb281116","text":"Quelle marque horlogère utilise une couronne vissée brevetée qu'elle appelle \"Twinlock\" ou \"Triplock\" ?","diff":2,"cat":"culture","expl":"Le système Twinlock (deux joints) et Triplock (trois joints) sont des couronnes vissées exclusives à Rolex, assurant l'étanchéité de ses boîtiers Oyster. Le Triplock équipe notamment la Submariner et la Sea-Dweller.","answers":[{"t":"Rolex","ok":true,"te":"Rolex"},{"t":"Omega","ok":false,"te":"Omega"},{"t":"Breitling","ok":false,"te":"Bretling"},{"t":"Panerai","ok":false,"te":"Panerai"}],"text_en":"Which watch brand uses a patented screw-down crown it calls \"Twinlock\" or \"Triplock\"?","expl_en":"The Twinlock (two seals) and Triplock (three seals) systems are screw-down crowns exclusive to Rolex, ensuring the water resistance of its Oyster cases. The Triplock equips notably the Submariner and Sea-Dweller."},{"id":"bcd7ed15-0761-4695-9fce-2c6916119fb4","text":"Quel événement de 1983 est considéré comme le tournant qui a sauvé l'industrie horlogère suisse de la crise du quartz ?","diff":3,"cat":"culture","expl":"Lancée le 1er mars 1983 sous l'impulsion de Nicolas Hayek et Ernst Thomke, la Swatch était une montre quartz Swiss Made à 50 francs en boîtier plastique. Plus de 100 millions d'exemplaires furent vendus en moins de dix ans.","answers":[{"t":"Le lancement de la Swatch","ok":true,"te":"The launch of the Swatch"},{"t":"La création du Swatch Group","ok":false,"te":"The creation of the Swatch Group"},{"t":"L'introduction du label Swiss Made","ok":false,"te":"The introduction of the mandatory Swiss Made label"},{"t":"Le rachat d'Omega par Nicolas Hayek","ok":false,"te":"The acquisition of Omega by Nicolas Hayek"}],"text_en":"Which 1983 event is considered the turning point that saved the Swiss watch industry from the quartz crisis?","expl_en":"Launched on March 1, 1983, driven by Nicolas Hayek and Ernst Thomke, the Swatch was a Swiss Made quartz watch at 50 francs in a plastic case. Over 100 million units were sold in less than ten years."},{"id":"580e29a1-5c3e-48b5-855a-d886b30b5aaf","text":"Qu'est-ce qu'un chronographe rattrapante ?","diff":3,"cat":"technique","expl":"La rattrapante possède deux aiguilles de chronographe superposées. En pressant un poussoir dédié, l'une se \"fait rattraper\" pour figer un temps intermédiaire, tandis que l'autre continue de mesurer.","answers":[{"t":"Un chronographe avec une deuxième aiguille superposée permettant de mesurer des temps intermédiaires","ok":true,"te":"A chronograph with a second superimposed hand allowing intermediate times to be measured"},{"t":"Un chronographe capable de revenir en arrière pour corriger une mesure","ok":false,"te":"A chronograph able to run backwards to correct a measurement"},{"t":"Un chronographe avec deux compteurs indépendants sur des cadrans séparés","ok":false,"te":"A chronograph with two independent counters on separate sub-dials"},{"t":"Un chronographe dont l'aiguille effectue un tour de cadran en 30 secondes au lieu de 60","ok":false,"te":"A chronograph whose hand completes a full rotation in 30 seconds instead of 60"}],"text_en":"What is a split-seconds chronograph?","expl_en":"The split-seconds has two superimposed chronograph hands. By pressing a dedicated pusher, one hand is \"caught\" to freeze an intermediate time, while the other continues measuring."},{"id":"40b14250-781e-4bc1-8481-156b7000dcb3","text":"En 1810, quel horloger a créé ce qui est considéré comme la première montre-bracelet de l'histoire, pour la reine de Naples Caroline Murat ?","diff":4,"cat":"histoire","expl":"La montre N°2639, commandée par Caroline Murat, sœur de Napoléon, était une répétition minutes ovale ultra-fine montée sur un bracelet de cheveux tressés de fils d'or. Elle a été livrée en 1812 et est aujourd'hui introuvable.","answers":[{"t":"Abraham-Louis Breguet","ok":true,"te":"Abraham-Louis Breguet"},{"t":"Louis Cartier","ok":false,"te":"Louis Cartier"},{"t":"Adrien Philippe","ok":false,"te":"Adrien Philippe"},{"t":"Antoine LeCoultre","ok":false,"te":"Antoine LeCoultre"}],"text_en":"In 1810, which watchmaker created what is considered the first wristwatch in history, for the Queen of Naples Caroline Murat?","expl_en":"Watch No. 2639, commissioned by Caroline Murat, Napoleon's sister, was an ultra-thin oval minute repeater mounted on a bracelet of hair woven with gold thread. It was delivered in 1812 and is now lost."},{"id":"e7e218a6-93fe-4f47-a350-5dfe9f69525e","text":"Qu'est-ce qu'un mouvement \"manufacture\" en horlogerie ?","diff":1,"cat":"technique","expl":"Un calibre manufacture est développé et fabriqué par la maison horlogère elle-même, par opposition à un mouvement acheté à un fournisseur d'ébauches comme ETA ou Sellita.","answers":[{"t":"Un mouvement conçu et produit en interne par la marque","ok":true,"te":"A movement designed and produced in-house by the brand"},{"t":"Un mouvement assemblé à la main plutôt qu'à la machine","ok":false,"te":"A movement assembled by hand rather than by machine"},{"t":"Un mouvement certifié par le COSC","ok":false,"te":"A movement certified by COSC"},{"t":"Un mouvement fabriqué exclusivement en Suisse","ok":false,"te":"A movement manufactured exclusively in Switzerland"}],"text_en":"What is a \"manufacture\" movement in watchmaking?","expl_en":"A manufacture calibre is developed and produced by the watch house itself, as opposed to a movement purchased from an ébauche supplier like ETA or Sellita."},{"id":"2b2939e7-50c5-4d2e-aeeb-b88466a6e2fd","text":"Quelle montre a été la première portée sur la surface lunaire, le 21 juillet 1969 ?","diff":1,"cat":"culture","expl":"Neil Armstrong ayant laissé sa Speedmaster dans le module lunaire comme chronomètre de secours, c'est Buzz Aldrin qui porta la sienne sur la Lune, faisant de la Speedmaster la première montre sur le sol lunaire.","answers":[{"t":"Omega Speedmaster Professional","ok":true,"te":"Omega Speedmaster Professional"},{"t":"Rolex Cosmograph Daytona","ok":false,"te":"Rolex Cosmograph Daytona"},{"t":"Breitling Navitimer Cosmonaute","ok":false,"te":"Breitling Navitimer Cosmonaute"},{"t":"Bulova Lunar Pilot","ok":false,"te":"Bulova Lunar Pilot"}],"text_en":"Which watch was the first worn on the lunar surface, on July 21, 1969?","expl_en":"Neil Armstrong having left his Speedmaster inside the lunar module as a backup timer, it was Buzz Aldrin who wore his on the Moon, making the Speedmaster the first watch on the lunar surface."},{"id":"a84262e5-44e0-4c89-88b7-a74fcd76ed1a","text":"En 2022, quel nouveau calibre manufacture a remplacé le légendaire 2121 dans la Royal Oak \"Jumbo\" Extra-Thin, pour la première fois en 50 ans ?","diff":4,"cat":"culture","expl":"Introduit dans la réf. 16202, le calibre 7121 est le premier mouvement entièrement développé par AP pour la Jumbo. Il offre 55 heures de réserve de marche et bat à 4 Hz, contre 40 heures et 2,75 Hz pour le 2121.","answers":[{"t":"Calibre 7121","ok":true,"te":"Caliber 7121"},{"t":"Calibre 4302","ok":false,"te":"Caliber 4302"},{"t":"Calibre 3120","ok":false,"te":"Caliber 3120"},{"t":"Calibre 2121 II","ok":false,"te":"Caliber 2121 II"}],"text_en":"In 2022, which new manufacture calibre replaced the legendary 2121 in the Royal Oak \"Jumbo\" Extra-Thin, for the first time in 50 years?","expl_en":"Introduced in ref. 16202, the calibre 7121 is the first movement entirely developed by AP for the Jumbo. It offers 55 hours of power reserve and beats at 4 Hz, versus 40 hours and 2.75 Hz for the 2121."},{"id":"eefb0d46-ede1-4e0d-95e5-d59276aaaa22","text":"Quel horloger est considéré comme le père de la montre-bracelet moderne grâce à la Santos, créée en 1904 ?","diff":2,"cat":"culture","expl":"Louis Cartier a conçu la Santos pour son ami aviateur Alberto Santos-Dumont, qui avait besoin de lire l'heure en vol sans lâcher les commandes.","answers":[{"t":"Louis Cartier","ok":true,"te":"Louis Cartier"},{"t":"Hans Wilsdorf","ok":false,"te":"Hans Wilsdorf"},{"t":"Alberto Santos-Dumont","ok":false,"te":"Alberto Santos-Dumont"},{"t":"Edmond Jaeger","ok":false,"te":"Edmond Jaeger"}],"text_en":"Which watchmaker is considered the father of the modern wristwatch thanks to the Santos, created in 1904?","expl_en":"Louis Cartier designed the Santos for his aviator friend Alberto Santos-Dumont, who needed to read the time while flying without releasing the controls."},{"id":"fffdbda1-260c-4d12-98f2-aad05ffa6c94","text":"Quel est le rôle d'une roue à colonnes dans un chronographe mécanique ?","diff":4,"cat":"technique","expl":"La roue à colonnes est un mécanisme de commande considéré comme plus noble qu'un système à navette. Ses colonnes pivotent pour engager ou libérer les leviers du chronographe à chaque pression des poussoirs.","answers":[{"t":"Coordonner le démarrage, l'arrêt et la remise à zéro du chronographe","ok":true,"te":"To coordinate the start, stop, and reset of the chronograph"},{"t":"Contrôler l'embrayage entre le mouvement de base et le module chronographe","ok":false,"te":"To control the clutch between the base movement and the chronograph module"},{"t":"Actionner les marteaux de remise à zéro des compteurs","ok":false,"te":"To actuate the reset hammers of the counters"},{"t":"Réguler la tension du ressort de frein de l'aiguille chronographe","ok":false,"te":"To regulate the tension of the chronograph hand brake spring"}],"text_en":"What is the role of a column wheel in a mechanical chronograph?","expl_en":"The column wheel is a control mechanism considered more refined than a cam-actuated (shuttle) system. Its columns rotate to engage or release the chronograph levers with each press of the pushers."},{"id":"d648af8b-f94b-4e33-ad46-0915f56140a5","text":"Quel surnom est donné à la Rolex Daytona référence 116500LN à lunette céramique noire et cadran blanc ?","diff":3,"cat":"culture","expl":"Le contraste entre le cadran blanc et les sous-compteurs noirs évoque le visage d'un panda. Ce surnom s'applique à toute Daytona présentant cette configuration depuis les années 1960.","answers":[{"t":"Panda","ok":true,"te":"Panda"},{"t":"Tuxedo","ok":false,"te":"Tuxedo"},{"t":"Polar","ok":false,"te":"Polar"},{"t":"Ghost","ok":false,"te":"Ghost"}],"text_en":"What nickname is given to the Rolex Daytona reference 116500LN with a black ceramic bezel and white dial?","expl_en":"The contrast between the white dial and black sub-dials resembles a panda's face. This nickname applies to any Daytona featuring this configuration since the 1960s."},{"id":"c9e41550-4215-4f82-8380-1fe10a9a47a3","text":"Quelle manufacture horlogère suisse a été sauvée par un employé qui a caché les outils et plans d'un célèbre calibre pendant la crise du quartz ?","diff":3,"cat":"histoire","expl":"En 1975, Charles Vermot a secrètement caché presses, outils et plans techniques de l'El Primero dans le grenier de la manufacture à Le Locle, permettant sa relance en 1984.","answers":[{"t":"Zenith","ok":true,"te":"Zenith"},{"t":"Omega","ok":false,"te":"Omega"},{"t":"Universal Genève","ok":false,"te":"Universal Genève"},{"t":"Movado","ok":false,"te":"Movado"}],"text_en":"Which Swiss watch manufacture was saved by an employee who hid the tools and plans of a famous caliber during the quartz crisis?","expl_en":"In 1975, Charles Vermot secretly hid the presses, tools, and technical plans of the El Primero in the manufacture's attic in Le Locle, enabling its revival in 1984."},{"id":"7e48c52f-3b15-4e56-bb2a-54185735c000","text":"Qu'est-ce qu'un tourbillon dans un mouvement mécanique ?","diff":3,"cat":"technique","expl":"Breveté par Breguet en 1801, le tourbillon fait tourner l'ensemble échappement-balancier sur lui-même, généralement en une minute, pour moyenner les écarts de marche dus à la gravité.","answers":[{"t":"Une cage rotative contenant l'échappement pour compenser les effets de la gravité","ok":true,"te":"A rotating cage containing the escapement to compensate for the effects of gravity"},{"t":"Un système de remontage automatique bidirectionnel","ok":false,"te":"A bidirectional automatic winding system"},{"t":"Un mécanisme de sonnerie à la demande","ok":false,"te":"An on-demand striking mechanism"},{"t":"Un second barillet pour augmenter la réserve de marche","ok":false,"te":"A second mainspring barrel to increase the power reserve"}],"text_en":"What is a tourbillon in a mechanical movement?","expl_en":"Patented by Breguet in 1801, the tourbillon rotates the entire escapement-balance assembly, typically once per minute, to average out rate variations caused by gravity."},{"id":"1a6a060b-7c29-4abb-9b5a-08fedcdddee4","text":"Quel designer a dessiné à la fois la Royal Oak pour Audemars Piguet et la Nautilus pour Patek Philippe ?","diff":2,"cat":"culture","expl":"Gérald Genta a dessiné la Royal Oak en 1972 et la Nautilus en 1976, les deux montres sport de luxe en acier les plus iconiques de l'histoire.","answers":[{"t":"Gérald Genta","ok":true,"te":"Gérald Genta"},{"t":"Jörg Hysek","ok":false,"te":"Jörg Hysek"},{"t":"Rupert Emmerson","ok":false,"te":"Rupert Emmerson"},{"t":"Emmanuel Gueit","ok":false,"te":"Emmanuel Gueit"}],"text_en":"Which designer created both the Royal Oak for Audemars Piguet and the Nautilus for Patek Philippe?","expl_en":"Gérald Genta designed the Royal Oak in 1972 and the Nautilus in 1976, the two most iconic luxury steel sports watches in history."},{"id":"2aff16af-25ea-444d-9712-a8d34edd94a1","text":"Quel type d'échappement utilise la grande majorité des montres mécaniques actuelles ?","diff":3,"cat":"technique","expl":"Inventé par Thomas Mudge au XVIIIe siècle, l'échappement à ancre suisse reste le standard quasi universel de l'horlogerie mécanique.","answers":[{"t":"Échappement à ancre suisse","ok":true,"te":"Swiss lever escapement"},{"t":"Échappement à cylindre","ok":false,"te":"Cylinder escapement"},{"t":"Échappement à détente","ok":false,"te":"Detent escapement"},{"t":"Échappement co-axial","ok":false,"te":"Co-axial escapement"}],"text_en":"What type of escapement is used in the vast majority of current mechanical watches?","expl_en":"Invented by Thomas Mudge in the 18th century, the Swiss lever escapement remains the near-universal standard in mechanical watchmaking."},{"id":"40dc9551-fda1-4a5c-b06b-1d513c0567d4","text":"Quel calibre manufacture équipait la Royal Oak \"Jumbo\" réf. 5402ST à son lancement en 1972 ?","diff":4,"cat":"culture","expl":"Le calibre 2121 est dérivé du JLC 920, l'un des mouvements automatiques les plus fins jamais produits (3,05 mm). Il a équipé la Jumbo pendant 50 ans.","answers":[{"t":"Calibre 2121","ok":true,"te":"Caliber 2121"},{"t":"Calibre 2120","ok":false,"te":"Caliber 2120"},{"t":"Calibre 3120","ok":false,"te":"Caliber 3120"},{"t":"Calibre 4302","ok":false,"te":"Caliber 4302"}],"text_en":"Which manufacture calibre powered the Royal Oak \"Jumbo\" ref. 5402ST at its launch in 1972?","expl_en":"The calibre 2121 is derived from the JLC 920, one of the thinnest automatic movements ever made (3.05mm). It powered the Jumbo for 50 years."},{"id":"83ef1462-89d4-4b09-8387-987bf309f61b","text":"Quel horloger anglais a construit les chronomètres de marine H1 à H4 pour résoudre le problème de la longitude ?","diff":5,"cat":"histoire","expl":"John Harrison a consacré plus de 30 ans à résoudre le problème de la longitude. Son H4, achevé en 1761, a prouvé qu'une montre pouvait déterminer la position en mer avec une précision suffisante.","answers":[{"t":"John Harrison","ok":true,"te":"John Harrison"},{"t":"Thomas Earnshaw","ok":false,"te":"Thomas Earnshaw"},{"t":"George Graham","ok":false,"te":"George Graham"},{"t":"Thomas Mudge","ok":false,"te":"Thomas Mudge"}],"text_en":"Which English clockmaker built the marine chronometers H1 to H4 to solve the longitude problem?","expl_en":"John Harrison spent over 30 years solving the longitude problem. His H4, completed in 1761, proved that a watch could determine position at sea with sufficient accuracy."},{"id":"4bbac6b7-fd14-4971-9dbc-ead6392bf4cc","text":"Comment appelle-t-on la pièce semi-circulaire qui tourne librement pour remonter le ressort d'une montre automatique ?","diff":2,"cat":"technique","expl":"La masse oscillante pivote grâce aux mouvements du poignet et transmet son énergie au barillet.","answers":[{"t":"La masse oscillante","ok":true,"te":"The oscillating weight (rotor)"},{"t":"Le balancier","ok":false,"te":"The balance wheel"},{"t":"La roue d'échappement","ok":false,"te":"The escape wheel"},{"t":"Le barillet","ok":false,"te":"The mainspring barrel"}],"text_en":"What is the name of the semi-circular part that rotates freely to wind the mainspring of an automatic watch?","expl_en":"The rotor pivots with wrist movements and transmits its energy to the mainspring barrel."},{"id":"b318149d-243b-4e3f-bc27-9442783e6fd7","text":"Quel mouvement à remontage manuel, a équipé la Rolex Daytona des années 1960 aux années 1980 ?","diff":4,"cat":"culture","expl":"Le Valjoux 72 et ses dérivés (722, 727) ont animé toutes les Daytona manuelles de 1963 à 1988, y compris les célèbres \"Paul Newman\".","answers":[{"t":"Valjoux 72","ok":true,"te":"Valjoux 72"},{"t":"Valjoux 23","ok":false,"te":"Valjoux 23"},{"t":"Zenith El Primero","ok":false,"te":"Zenith El Primero"},{"t":"Rolex 4130","ok":false,"te":"Rolex 4130"}],"text_en":"Which manual-wind movement, powered the Rolex Daytona from the 1960s to the 1980s?","expl_en":"Le Valjoux 72 et ses dérivés (722, 727) ont animé toutes les Daytona manuelles de 1963 à 1988, y compris les célèbres \"Paul Newman\"."},{"id":"46deec39-1b47-4199-ab19-43fa8b9ba962","text":"Quel horloger a inventé le spiral à courbe terminale relevée, le pare-chute et la montre à tact ?","diff":4,"cat":"histoire","expl":"Breguet a inventé le pare-chute (1790), ancêtre de l'Incabloc, le spiral à courbe terminale relevée (1795) et la montre à tact (1799) qui permettait de lire l'heure au toucher.","answers":[{"t":"Abraham-Louis Breguet","ok":true,"te":"Abraham-Louis Breguet"},{"t":"John Harrison","ok":false,"te":"John Harrison"},{"t":"Thomas Mudge","ok":false,"te":"Thomas Mudge"},{"t":"Ferdinand Berthoud","ok":false,"te":"Ferdinand Berthoud"}],"text_en":"Which watchmaker invented the Breguet overcoil, the pare-chute and the tact watch?","expl_en":"Breguet invented the pare-chute (1790), ancestor of the Incabloc, the overcoil hairspring (1795), and the tact watch (1799) which allowed telling time by touch."},{"id":"74d406d0-9d9d-4ad1-ab34-f310028ecabf","text":"À quelle fréquence bat un mouvement mécanique fonctionnant à 28 800 alternances par heure ?","diff":3,"cat":"technique","expl":"28 800 alt/h divisé par 3 600 (secondes dans une heure) = 8 alternances par seconde, soit 4 oscillations complètes = 4 Hz.","answers":[{"t":"4 Hz","ok":true,"te":"4 Hz"},{"t":"3 Hz","ok":false,"te":"3 Hz"},{"t":"5 Hz","ok":false,"te":"5 Hz"},{"t":"2.5 Hz","ok":false,"te":"2.5 Hz"}],"text_en":"At what frequency does a mechanical movement beating at 28,800 vibrations per hour operate?","expl_en":"28,800 vph divided by 3,600 (seconds per hour) = 8 beats per second, meaning 4 full oscillations = 4 Hz."},{"id":"8d3bf17a-7a40-4180-bea2-0e74489fbf5a","text":"Quelle maison horlogère est célèbre pour le cabochon bleu qui orne la couronne de ses montres ?","diff":2,"cat":"culture","expl":"Le cabochon bleu sur la couronne est un code esthétique Cartier depuis le début du XXe siècle, présent sur la Tank, la Santos ou la Ballon Bleu.","answers":[{"t":"Cartier","ok":true,"te":"Cartier"},{"t":"Chopard","ok":false,"te":"Chopard"},{"t":"Bvlgari","ok":false,"te":"Bvlgari"},{"t":"Piaget","ok":false,"te":"Piaget"}],"text_en":"Which watch house is famous for the blue cabochon that adorns the crown of its watches?","expl_en":"The blue cabochon on the crown has been a Cartier design code since the early 20th century, found on the Tank, Santos and Ballon Bleu."},{"id":"7f19114f-bbf1-4515-bf35-1073b3a30be4","text":"En 1969, trois mouvements chronographes automatiques sont dévoilés. Lequel a été le premier à être commercialisé ?","diff":4,"cat":"histoire","expl":"Des exemplaires du Seiko 6139 avec des numéros de série datant de janvier 1969 existent, et la commercialisation a débuté en mai. Zenith a annoncé l'El Primero en premier, mais ne l'a livré qu'en octobre.","answers":[{"t":"Seiko 6139","ok":true,"te":"Seiko 6139"},{"t":"Zenith El Primero","ok":false,"te":"Zenith El Primero"},{"t":"Calibre 11 Chronomatic","ok":false,"te":"Calibre 11 Chronomatic"},{"t":"Valjoux 7750","ok":false,"te":"Valjoux 7750"}],"text_en":"In 1969, three automatic chronograph movements were unveiled. Which one was the first to be sold?","expl_en":"Seiko 6139 examples with serial numbers dating to January 1969 exist, and sales began in May. Zenith announced the El Primero first but didn't deliver until October."},{"id":"e58a7515-f9d0-4615-a482-3805f47cf12b","text":"Quel calibre, annoncé le 10 janvier 1969, est considéré comme le premier mouvement chronographe automatique intégré à haute fréquence ?","diff":3,"cat":"histoire","expl":"Le El Primero bat à 36 000 alternances/heure (5 Hz), une fréquence inédite à l'époque.","answers":[{"t":"Zenith El Primero","ok":true,"te":"Zenith El Primero"},{"t":"Seiko 6139","ok":false,"te":"Seiko 6139"},{"t":"Calibre 11 Chronomatic","ok":false,"te":"Caliber 11 Chronomatic"},{"t":"Valjoux 7750","ok":false,"te":"Valjoux 7750"}],"text_en":"Which calibre, announced on January 10, 1969, is considered the first integrated high-frequency automatic chronograph movement?","expl_en":"The El Primero beats at 36,000 vibrations/hour (5 Hz), an unprecedented frequency at the time."},{"id":"819f14c8-5147-4381-87cc-9210359a9afa","text":"Dans une montre automatique, quel dispositif permet au ressort de barillet de glisser en cas de remontage excessif ?","diff":3,"cat":"technique","expl":"La bride glissante laisse le ressort patiner dans le tambour quand il atteint sa tension maximale, évitant toute casse.","answers":[{"t":"La bride glissante","ok":true,"te":"The slipping bridle"},{"t":"Le cliquet","ok":false,"te":"The click"},{"t":"La tirette","ok":false,"te":"The setting lever"},{"t":"Le sautoir","ok":false,"te":"The jumper spring"}],"text_en":"In an automatic watch, what device allows the mainspring to slip in case of over-winding?","expl_en":"The slipping bridle lets the mainspring slip inside the barrel when it reaches maximum tension, preventing any damage."},{"id":"d0d9d8b8-422d-4856-9f65-5a1c638a48fd","text":"En quelle année Seiko a-t-elle commercialisé la première montre à quartz au monde, l'Astron ?","diff":3,"cat":"culture","expl":"La Seiko Quartz Astron 35SQ a été mise en vente le 25 décembre 1969 à Tokyo, marquant le début de la crise du quartz.","answers":[{"t":"1969","ok":true,"te":"1969"},{"t":"1972","ok":false,"te":"1972"},{"t":"1964","ok":false,"te":"1964"},{"t":"1975","ok":false,"te":"1975"}],"text_en":"In what year did Seiko release the world's first quartz wristwatch, the Astron?","expl_en":"The Seiko Quartz Astron 35SQ went on sale on December 25, 1969 in Tokyo, marking the beginning of the quartz crisis."},{"id":"524614a7-cccb-478c-983d-af1aa55ed8d5","text":"Quel est le principal avantage de l'échappement co-axial inventé par George Daniels ?","diff":4,"cat":"technique","expl":"En remplaçant la friction de glissement par une friction radiale, l'échappement co-axial réduit théoriquement l'usure et allonge les intervalles de révision.","answers":[{"t":"Réduire les frictions de glissement et le besoin en lubrification","ok":true,"te":"To reduce sliding friction and the need for lubrication"},{"t":"Augmenter la fréquence d'oscillation du balancier","ok":false,"te":"To increase the balance wheel's oscillation frequency"},{"t":"Supprimer entièrement la roue d'échappement","ok":false,"te":"To completely eliminate the escape wheel"},{"t":"Permettre un remontage automatique plus efficace","ok":false,"te":"To enable more efficient automatic winding"}],"text_en":"What is the main advantage of the co-axial escapement invented by George Daniels?","expl_en":"By replacing sliding friction with radial friction, the co-axial escapement reduces wear and theoretically extends service intervals."},{"id":"4f5ecb1a-11ff-437d-9578-0f3e22752df8","text":"Quel surnom est donné à la Rolex Submariner réf. 16610LV sortie en 2003 ?","diff":2,"cat":"culture","expl":"La lunette verte en aluminium de cette édition du 50e anniversaire de la Submariner a inspiré le surnom de la célèbre grenouille du Muppet Show.","answers":[{"t":"Kermit","ok":true,"te":"Kermit"},{"t":"Hulk","ok":false,"te":"Hulk"},{"t":"Starbucks","ok":false,"te":"Starbucks"},{"t":"Shrek","ok":false,"te":"Shrek"}],"text_en":"What nickname was given to the Rolex Submariner ref. 16610LV released in 2003?","expl_en":"The green aluminum bezel of this 50th anniversary Submariner edition inspired the nickname of the famous Muppet Show frog."},{"id":"37ac32f2-b54b-45de-8f04-07768e7ed93b","text":"Quelle maison horlogère a été fondée en premier ?","diff":2,"cat":"histoire","expl":"Vacheron Constantin, fondée à Genève en 1755, est la plus ancienne manufacture horlogère en activité continue.","answers":[{"t":"Vacheron Constantin","ok":true,"te":"Vacheron Constantin"},{"t":"Breguet","ok":false,"te":"Breguet"},{"t":"Jaeger-LeCoultre","ok":false,"te":"Jaeger-LeCoultre"},{"t":"Patek Philippe","ok":false,"te":"Patek Philippe"}],"text_en":"Which watch house was founded first?","expl_en":"Vacheron Constantin, founded in Geneva in 1755, is the oldest continuously operating watch manufacturer."},{"id":"315538f6-fb9a-448d-9274-771a390bed54","text":"Combien de positions de réglage sont testées lors de la certification COSC pour un mouvement mécanique ?","diff":4,"cat":"technique","expl":"Le COSC teste chaque mouvement pendant 15 jours dans 5 positions : cadran vers le haut, cadran vers le bas, couronne à 3h, 6h et 9h.","answers":[{"t":"5","ok":true,"te":"5"},{"t":"3","ok":false,"te":"3"},{"t":"6","ok":false,"te":"6"},{"t":"4","ok":false,"te":"4"}],"text_en":"How many positions are tested during COSC certification for a mechanical movement?","expl_en":"COSC tests each movement for 15 days in 5 positions: dial up, dial down, crown at 3, 6 and 9 o'clock."},{"id":"cb1d9519-97a1-42c2-9cfd-a7104e9c48df","text":"En quelle année Abraham-Louis Breguet a-t-il breveté le tourbillon ?","diff":5,"cat":"histoire","expl":"Breguet a obtenu le brevet du tourbillon le 26 juin 1801, une invention conçue pour compenser les effets de la gravité sur la marche d'une montre de poche.","answers":[{"t":"1801","ok":true,"te":"1801"},{"t":"1783","ok":false,"te":"1783"},{"t":"1815","ok":false,"te":"1815"},{"t":"1795","ok":false,"te":"1795"}],"text_en":"In what year did Abraham-Louis Breguet patent the tourbillon?  ✅ 1801","expl_en":"Breguet was granted the tourbillon patent on June 26, 1801, an invention designed to counteract the effects of gravity on a pocket watch's rate."},{"id":"17434cc4-7718-4604-816b-a9e8eae60dd0","text":"Quel est le rôle du spiral dans un mouvement mécanique ?","diff":2,"cat":"technique","expl":"Le spiral est un fin ressort qui contrôle les allers-retours du balancier.","answers":[{"t":"Réguler la fréquence d'oscillation du balancier","ok":true,"te":"To regulate the oscillation frequency of the balance wheel"},{"t":"Transmettre l'énergie du barillet","ok":false,"te":"To transmit energy from the mainspring barrel"},{"t":"Lubrifier l'échappement","ok":false,"te":"To lubricate the escapement"},{"t":"Amortir les chocs sur l'axe de balancier","ok":false,"te":"To absorb shocks on the balance staff"}],"text_en":"What is the role of the hairspring in a mechanical movement?","expl_en":"The hairspring is a thin spring that controls the back-and-forth motion of the balance wheel."},{"id":"2fa9f248-6257-4857-9959-2d10261aa79e","text":"Surnom de Jaeger-LeCoultre.","diff":2,"cat":"culture","expl":"Jaeger-LeCoultre — surnommée « La Grande Maison » depuis le XIXe siècle, quand Antoine LeCoultre rassembla les artisans de la Vallée de Joux sous un même toit, créant l'une des plus grandes manufactures de l'histoire horlogère.","answers":[{"t":"La Grande Maison","ok":true,"te":"La Grande Maison"},{"t":"La Manufacture","ok":false,"te":"La Manufacture"},{"t":"La Maison Mère","ok":false,"te":"La Maison Mère"},{"t":"Le Grand Atelier","ok":false,"te":"Le Grand Atelier"}],"text_en":"Surnom de Jaeger-LeCoultre.","expl_en":"Jaeger-LeCoultre — nicknamed \"La Grande Maison\" since the 19th century, when Antoine LeCoultre gathered the craftsmen of the Vallée de Joux under one roof, creating one of the largest manufactures in watchmaking history."},{"id":"3e8cd1c1-3511-4ccf-ac25-8496753caac6","text":"Fondateur de la maison Breguet.","diff":1,"cat":"histoire","expl":"Abraham-Louis Breguet fonda sa maison à Paris en 1775 au Quai de l'Horloge. Considéré comme le plus grand horloger de tous les temps, on lui doit le tourbillon, le spiral Breguet, la première montre à répétition automatique et les aiguilles qui portent son nom.","answers":[{"t":"Abraham-Louis Breguet","ok":true,"te":"Abraham-Louis Breguet"},{"t":"Louis Cartier","ok":false,"te":"Louis Cartier"},{"t":"Hans Wilsdorf","ok":false,"te":"Hans Wilsdorf"},{"t":"François-Constantin","ok":false,"te":"François-Constantin"}],"text_en":"Founder of the house of Breguet.","expl_en":"Abraham-Louis Breguet founded his house in Paris in 1775 on the Quai de l'Horloge. Considered the greatest watchmaker of all time, he invented the tourbillon, the Breguet hairspring, the first automatic striking watch, and the hands that bear his name."},{"id":"ce747dc1-17af-4abd-af3f-8db83ae392ff","text":"Marque fabriquant la Submariner.","diff":1,"cat":"culture","expl":"Lancée en 1953, la Rolex Submariner fut l'une des premières montres étanches à 100m. Elle a défini les codes de la montre de plongée moderne (lunette tournante unidirectionnelle, cadran luminescent, couronne vissée) et reste l'une des montres les plus connues au monde.","answers":[{"t":"Rolex","ok":true,"te":"Rolex"},{"t":"Omega","ok":false,"te":"Omega"},{"t":"Blancpain","ok":false,"te":"Blancpain"},{"t":"Panerai","ok":false,"te":"Panerai"}],"text_en":"Brand manufacturing the Submariner.","expl_en":"Launched in 1953, the Rolex Submariner was one of the first watches water-resistant to 100m. It defined the modern dive watch codes (unidirectional rotating bezel, luminescent dial, screw-down crown) and remains one of the most recognized watches in the world."},{"id":"d3273120-c7a6-4231-84ee-8fe4a070c438","text":"Signification du sigle COSC","diff":3,"cat":"culture","expl":"Le COSC teste chaque mouvement individuellement pendant 15 jours dans 5 positions et à 3 températures, selon la norme ISO 3159. La tolérance est de -4/+6 secondes par jour. Seuls environ 3% de la production suisse obtiennent cette certification.","answers":[{"t":"Contrôle Officiel Suisse des Chronomètres","ok":true,"te":"Official Swiss Chronometer Testing Institute"},{"t":"Certification Officielle Suisse de Chronométrie","ok":false,"te":"Official Swiss Chronometry Certification"},{"t":"Comité Officiel Suisse de Calibration","ok":false,"te":"Official Swiss Calibration Committee"},{"t":"Centre d'Observation Suisse des Chronomètres","ok":false,"te":"Swiss Chronometer Observation Centre"}],"text_en":"What does COSC stand for?","expl_en":"COSC tests each movement individually over 15 days in 5 positions and at 3 temperatures, per ISO 3159 standard. The tolerance is -4/+6 seconds per day. Only about 3% of Swiss production earns this certification."},{"id":"995430d3-d5ab-40ef-b286-ef8759438ea4","text":"Année de lancement de la Royal Oak.","diff":3,"cat":"histoire","expl":"Dessinée en une seule nuit par Gérald Genta, la Royal Oak d'Audemars Piguet fut présentée à Bâle en 1972. Première montre de sport de luxe en acier, elle a brisé les conventions avec son boîtier octogonal et ses vis apparentes. Son prix en acier dépassait celui de nombreuses montres en or.","answers":[{"t":"1972","ok":true,"te":"1972"},{"t":"1969","ok":false,"te":"1969"},{"t":"1976","ok":false,"te":"1976"},{"t":"1965","ok":false,"te":"1965"}],"text_en":"Year the Royal Oak was launched.","expl_en":"Designed in a single night by Gérald Genta, the Audemars Piguet Royal Oak was unveiled at Basel in 1972. The first luxury steel sports watch, it broke conventions with its octagonal case and exposed screws. Its steel price exceeded that of many gold watches."},{"id":"ea2468aa-5a1c-430e-bb45-39387994d100","text":"Groupe propriétaire d'Omega, Blancpain et Breguet.","diff":2,"cat":"culture","expl":"Fondé par Nicolas Hayek, le Swatch Group est le plus grand conglomérat horloger suisse. Il réunit aussi Longines, Tissot, Hamilton et possède ETA, le principal fournisseur de mouvements de l'industrie. Le groupe a littéralement sauvé l'horlogerie suisse de la crise du quartz dans les années 1980.","answers":[{"t":"Swatch Group","ok":true,"te":"Swatch Group"},{"t":"LVMH","ok":false,"te":"LVMH"},{"t":"Richemont","ok":false,"te":"Richemont"},{"t":"Kering","ok":false,"te":"Kering"}],"text_en":"Group owning Omega, Blancpain and Breguet.","expl_en":"Founded by Nicolas Hayek, the Swatch Group is the largest Swiss watch conglomerate. It also includes Longines, Tissot, Hamilton and owns ETA, the industry's main movement supplier. The group literally saved the Swiss watch industry from the quartz crisis in the 1980s."},{"id":"c0896d4b-e844-496e-8a75-90fba76996f5","text":"Finition en stries parallèles sur les ponts.","diff":3,"cat":"technique","expl":"Les Côtes de Genève sont des stries parallèles décoratives appliquées sur les ponts et platines. Réalisées avec un bâton de buis rotatif ou sur une machine spéciale, elles créent un jeu de lumière alternant bandes mates et brillantes. C'est l'un des critères du Poinçon de Genève.","answers":[{"t":"Côtes de Genève","ok":true,"te":"Geneva stripes"},{"t":"Perlage","ok":false,"te":"Perlage"},{"t":"Anglage","ok":false,"te":"Anglage"},{"t":"Satinage","ok":false,"te":"Satin brushing"}],"text_en":"Parallel stripe finishing on bridges.","expl_en":"Geneva stripes are decorative parallel lines applied to bridges and plates. Made with a rotating boxwood stick or a special machine, they create a light play alternating matte and shiny bands. This is one of the criteria for the Geneva Seal."}];

function shuffle(a){var b=[].concat(a);for(var i=b.length-1;i>0;i--){var j=0|Math.random()*(i+1);var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function seededShuffle(a,seed){var b=[].concat(a);var s=seed;function r(){s=(s*9301+49297)%233280;return s/233280;}for(var i=b.length-1;i>0;i--){var j=0|r()*(i+1);var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function todaySeed(){var d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();}
function isToday(ds){if(!ds)return false;var d=new Date(ds),n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();}
function isYesterday(ds){if(!ds)return false;var d=new Date(ds),y=new Date();y.setDate(y.getDate()-1);return d.getFullYear()===y.getFullYear()&&d.getMonth()===y.getMonth()&&d.getDate()===y.getDate();}
