<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collection — HOROQUEST</title>
<link rel="stylesheet" href="../../assets/styles.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="../../index.html" class="logo" aria-label="Horoquest, accueil">HOROQUEST<span class="dot"></span></a>
    <nav class="nav-center" aria-label="Principale">
      <a href="../../index.html#collections" class="active">Collections</a>
      <a href="../../index.html#how">Comment ça marche</a>
    </nav>
    <div class="nav-right">
      <div class="lang-toggle" role="group" aria-label="Langue">
        <button class="on" aria-pressed="true">FR</button>
        <button aria-pressed="false">EN</button>
      </div>
      <a href="#" class="btn btn-ghost">Connexion</a>
      <button class="burger" aria-label="Menu"><span></span></button>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <nav class="breadcrumb" aria-label="Fil d'ariane">
      <a href="../../index.html#collections">Collections</a>
      <span class="sep">/</span>
      <span class="current" id="breadcrumbName">…</span>
    </nav>
  </div>

  <section class="coll-hero">
    <div class="container">
      <div class="coll-hero-image" id="heroImage"></div>
      <div class="coll-hero-meta">
        <div>
          <span class="pill" id="pillCount"></span>
          <h1 style="margin-top:18px;" id="collName"></h1>
          <p class="desc" id="collDesc"></p>
        </div>
        <div>
          <a href="#" class="btn btn-primary btn-lg" id="playBtn">Jouer au quiz →</a>
        </div>
      </div>
    </div>
  </section>

  <section class="section" style="padding-top:32px;">
    <div class="container">
      <div class="section-head">
        <h2>Découvrir d'autres collections</h2>
        <a href="../../index.html#collections" class="meta" style="text-decoration:none;">Voir tout →</a>
      </div>
      <div class="coll-grid" id="otherGrid"></div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom">
      <div class="logo">HOROQUEST<span class="dot"></span></div>
      <nav>
        <a href="#">Politique de confidentialité</a>
        <a href="#">Conditions</a>
        <a href="#">Contact</a>
      </nav>
      <div>© 2025 Horoquest</div>
    </div>
  </div>
</footer>

<script>
const SUPABASE_URL = 'https://bqnawfnkukcbqkujsskr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxbmF3Zm5rdWtjYnFrdWpzc2tyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODQ5NDAsImV4cCI6MjA4NzE2MDk0MH0.VeSr_1gEnsn3P0_cmQBcOkJNDpUe1rbIAD8E7nSbxQM';
const headers = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };

const params = new URLSearchParams(location.search);
const slug = params.get('slug') || location.pathname.split('/').pop().replace('.html', '');

async function load() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/themes?select=*&slug=eq.${slug}`, { headers });
  const themes = await res.json();
  if (!themes.length) { document.title = 'Collection introuvable'; return; }
  const theme = themes[0];

  document.title = theme.name + ' — HOROQUEST';
  document.getElementById('breadcrumbName').textContent = theme.name;
  document.getElementById('collName').textContent = theme.name + '.';
  document.getElementById('collDesc').textContent = theme.description;
  document.getElementById('playBtn').href = '../jeu/index.html?slug=' + theme.slug;

  // Count questions
  const qRes = await fetch(`${SUPABASE_URL}/rest/v1/questions?select=id&theme_slugs=cs.{${theme.filter_value}}`, { headers });
  const qs = await qRes.json();
  const count = Array.isArray(qs) ? qs.length : 0;
  document.getElementById('pillCount').textContent = count + ' questions';

  // Hero image
  if (theme.image_url) {
    const img = document.createElement('img');
    img.src = theme.image_url;
    img.alt = theme.name;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
    document.getElementById('heroImage').appendChild(img);
  }

  // Other collections
  const allRes = await fetch(`${SUPABASE_URL}/rest/v1/themes?select=slug,name,image_url,description&is_active=eq.true&slug=neq.${slug}&limit=4&order=sort_order`, { headers });
  const others = await allRes.json();
  const ICON_DOT = '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="3"/></svg>';
  document.getElementById('otherGrid').innerHTML = others.map(c => `
    <a class="coll-card" href="index.html?slug=${c.slug}">
      <div class="coll-thumb">${c.image_url ? `<img src="${c.image_url}" alt="${c.name}" style="width:100%;height:100%;object-fit:cover;">` : ''}</div>
      <h3 class="coll-title">${c.name}</h3>
    </a>
  `).join('');
}
load();
</script>

</body>
</html>
