<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — HOROQUEST</title>
<link rel="stylesheet" href="../../assets/styles.css?v=2">
</head>
<body class="quiz-page">

<header class="quiz-header">
  <div class="container">
    <a class="quiz-back" id="backLink" href="../collections/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="15 18 9 12 15 6"/></svg>
      <span id="backName">Collection</span>
    </a>
    <a class="quiz-close" href="/" aria-label="Fermer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
    </a>
  </div>
  <div class="quiz-progress" aria-hidden="true"><div class="bar" id="progBar" style="width:0%;"></div></div>
</header>

<main class="quiz-main">
  <div class="container">
    <div id="loading" style="text-align:center;padding:60px 0;color:var(--ink-soft);">
      Chargement des questions…
    </div>
    <div id="quizContent" hidden>
      <div class="q-num">Question <strong id="qNum">1</strong>/10</div>
      <h1 class="q-text" id="qText"></h1>
      <div class="answers" id="answers"></div>
      <div class="explain" id="explain" hidden></div>
      <div class="next-row" id="nextRow" hidden>
        <button class="btn btn-primary" id="nextBtn">Question suivante →</button>
      </div>
    </div>
    <div id="quizEnd" hidden style="text-align:center;padding:40px 0;">
      <div class="result-eyebrow" id="resultEyebrow">Quiz terminé</div>
      <div class="score"><span id="finalScore">0</span><span class="max">/10</span></div>
      <div class="score-label" id="scoreLabel"></div>
      <div class="result-actions" style="justify-content:center;margin-top:24px;">
        <button class="btn btn-primary" onclick="location.reload()">Rejouer</button>
        <a href="/" class="btn btn-ghost">Retour aux collections</a>
      </div>
    </div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://bqnawfnkukcbqkujsskr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxbmF3Zm5rdWtjYnFrdWpzc2tyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODQ5NDAsImV4cCI6MjA4NzE2MDk0MH0.VeSr_1gEnsn3P0_cmQBcOkJNDpUe1rbIAD8E7nSbxQM';
const headers = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };

const params = new URLSearchParams(location.search);
const slug = params.get('slug') || 'rolex';

let questions = [];
let current = 0;
let score = 0;
let themeName = '';

async function init() {
  // Load theme info
  const tRes = await fetch(`${SUPABASE_URL}/rest/v1/themes?select=name,filter_value,slug&slug=eq.${slug}`, { headers });
  const themes = await tRes.json();
  if (themes.length) {
    themeName = themes[0].name;
    document.title = 'Quiz ' + themeName + ' — HOROQUEST';
    document.getElementById('backName').textContent = themeName;
    document.getElementById('backLink').href = '../collections/?slug=' + themes[0].slug;
    document.getElementById('resultEyebrow').textContent = 'Quiz terminé · ' + themeName;
    await fetchQuestions(themes[0].filter_value);
  } else {
    await fetchQuestions(null);
  }
}

async function fetchQuestions(filterValue) {
  try {
    let url = `${SUPABASE_URL}/rest/v1/questions?select=id,text,explanation,difficulty,answers(id,text,is_correct)`;
    if (filterValue) url += `&theme_slugs=cs.{${filterValue}}`;
    url += '&limit=100';
    const res = await fetch(url, { headers });
    let data = await res.json();
    if (!Array.isArray(data)) throw new Error('Invalid response');
    data = data.filter(q => q.answers && q.answers.length === 4);
    for (let i = data.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [data[i], data[j]] = [data[j], data[i]];
    }
    questions = data.slice(0, 10);
    if (questions.length === 0) throw new Error('Aucune question pour ce thème');
    showQuestion();
  } catch (e) {
    document.getElementById('loading').textContent = 'Aucune question disponible pour ce thème.';
    console.error(e);
  }
}

function showQuestion() {
  document.getElementById('loading').hidden = true;
  document.getElementById('quizContent').hidden = false;
  document.getElementById('quizEnd').hidden = true;

  const q = questions[current];
  document.getElementById('qNum').textContent = current + 1;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progBar').style.width = ((current) / questions.length * 100) + '%';
  const explain = document.getElementById('explain');
  explain.hidden = true;
  explain.classList.remove('visible');
  document.getElementById('nextRow').hidden = true;

  const answersDiv = document.getElementById('answers');
  const letters = ['A', 'B', 'C', 'D'];
  const shuffled = [...q.answers];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  answersDiv.innerHTML = shuffled.map((a, i) => `
    <button class="answer" data-i="${i}" data-correct="${a.is_correct}">
      <span class="letter">${letters[i]}</span>
      <span>${a.text}</span>
    </button>
  `).join('');

  answersDiv.querySelectorAll('.answer').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(btn));
  });
}

function handleAnswer(btn) {
  const buttons = document.querySelectorAll('.answer');
  if (btn.disabled) return;
  buttons.forEach(b => b.disabled = true);

  const isCorrect = btn.dataset.correct === 'true';
  let correctBtn = null;

  if (isCorrect) {
    btn.classList.add('correct');
    correctBtn = btn;
    score++;
  } else {
    btn.classList.add('incorrect');
    buttons.forEach(b => {
      if (b.dataset.correct === 'true') {
        b.classList.add('reveal-correct');
        correctBtn = b;
      }
    });
  }

  const q = questions[current];

  if (correctBtn) {
    if (!isCorrect) {
      const wrongText = btn.querySelector('span:not(.letter)').textContent;
      const wrongDiv = document.createElement('div');
      wrongDiv.className = 'answer-wrong-recall';
      wrongDiv.innerHTML = '<span class="wrong-label">Votre réponse</span>' + wrongText;
      correctBtn.insertBefore(wrongDiv, correctBtn.querySelector('.letter').nextSibling);
    }
    if (q.explanation) {
      const explainDiv = document.createElement('div');
      explainDiv.className = 'answer-explain';
      explainDiv.textContent = q.explanation;
      correctBtn.appendChild(explainDiv);
    }
  }

  setTimeout(() => {
    buttons.forEach(b => {
      if (b !== correctBtn) b.classList.add('fade-out');
    });
    correctBtn.classList.add('expanded');

    setTimeout(() => {
      const inner = correctBtn.querySelector('.answer-explain');
      if (inner) inner.classList.add('show');
      document.getElementById('nextRow').hidden = false;
    }, 300);
  }, 500);

  document.getElementById('progBar').style.width = ((current + 1) / questions.length * 100) + '%';
}

document.getElementById('nextBtn').addEventListener('click', () => {
  current++;
  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
});

function showResult() {
  document.getElementById('quizContent').hidden = true;
  document.getElementById('quizEnd').hidden = false;
  document.getElementById('finalScore').textContent = score;
  const pct = score / questions.length;
  const label = pct >= 0.9 ? 'Maître horloger !' :
                pct >= 0.7 ? 'Connaisseur averti' :
                pct >= 0.5 ? 'Amateur éclairé' :
                pct >= 0.3 ? 'Apprenti horloger' : 'Novice curieux';
  document.getElementById('scoreLabel').textContent = label;
}

init();
</script>
</body>
</html>
